<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Generator</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-family: system-ui, sans-serif; font-size: 14px; }

        body { min-height: 100vh; padding: 1.5rem; background: #fff; color: #000; }
        html.dark body { background: #171717; color: #fff; }

        .container { max-width: 56rem; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

        h1 { font-size: 1.25rem; font-weight: 700; }

        .controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }

        input[type="color"] { width: 4rem; height: 2.5rem; padding: 0; border: 1px solid #d1d5db; cursor: pointer; }

        .label-group { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; white-space: nowrap; }

        .muted { color: #6b7280; }
        html.dark .muted { color: #9ca3af; }

        select, input[type="text"] {
            border: 1px solid #d1d5db;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            background: #fff;
            color: #000;
        }
        html.dark select, html.dark input[type="text"] {
            background: #262626;
            border-color: #525252;
            color: #fff;
        }

        .swatch-headers {
            display: flex;
            font-size: 0.75rem;
            font-weight: 600;
            color: #6b7280;
            padding-bottom: 0.25rem;
        }
        html.dark .swatch-headers { color: #9ca3af; }
        .swatch-headers span { width: 50%; padding-left: 0.75rem; }

        .swatch-row { display: flex; }
        .swatch-hex { width: 50%; display: flex; align-items: center; gap: 0.75rem; padding: 0.375rem 0.75rem; }
        .swatch-oklch { width: 50%; display: flex; align-items: center; justify-content: flex-end; padding: 0.375rem 0.75rem; }
        .step-num { width: 2rem; flex-shrink: 0; }
        .mono { font-family: monospace; user-select: all; cursor: text; }

        .name-row { display: flex; align-items: center; gap: 0.75rem; font-size: 0.875rem; }
        .name-row input { flex: 1; }

        .css-blocks { display: flex; flex-direction: column; gap: 1rem; }
        .css-label { font-size: 0.75rem; color: #6b7280; margin-bottom: 0.25rem; }
        html.dark .css-label { color: #9ca3af; }

        pre {
            padding: 1rem;
            font-size: 0.875rem;
            overflow-x: auto;
            user-select: all;
            cursor: text;
            font-family: monospace;
            white-space: pre;
            line-height: 1.6;
        }

        .dark-toggle {
            position: fixed;
            top: 0.5rem;
            right: 0.5rem;
            z-index: 10;
            padding: 0.375rem 0.625rem;
            border: 1px solid #d1d5db;
            background: #fff;
            color: #000;
            cursor: pointer;
            font-size: 0.75rem;
        }
        html.dark .dark-toggle { background: #262626; border-color: #525252; color: #fff; }
    </style>
    <style id="sel-style"></style>
</head>
<body>
    <button class="dark-toggle" id="dark-toggle"></button>

    <div class="container">
        <h1>Color Generator</h1>

        <div class="controls">
            <input type="color" id="color-input" value="#3b82f6">
            <label class="label-group">
                <span class="muted">Anchored on</span>
                <select id="anchor-select"></select>
            </label>
        </div>

        <div>
            <div class="swatch-headers">
                <span id="hex-col-label"></span>
                <span id="oklch-col-label"></span>
            </div>
            <div id="swatches"></div>
        </div>

        <label class="name-row">
            <span class="muted" style="white-space:nowrap">Enter color name:</span>
            <input type="text" id="name-input" placeholder="my-color">
        </label>

        <div class="css-blocks">
            <div>
                <p class="css-label" id="label-hex"></p>
                <pre id="css-hex"></pre>
            </div>
            <div>
                <p class="css-label" id="label-oklch-computed"></p>
                <pre id="css-oklch-computed"></pre>
            </div>
            <div>
                <p class="css-label" id="label-oklch-mix"></p>
                <pre id="css-oklch-mix"></pre>
            </div>
        </div>
    </div>

    <script>
        // --- Pure color functions (identical to Color.jsx) ---

        function hexToRgb(hex) {
            hex = hex.replace('#', '');
            return [parseInt(hex.substring(0, 2), 16), parseInt(hex.substring(2, 4), 16), parseInt(hex.substring(4, 6), 16)];
        }

        function rgbToHex([r, g, b]) {
            return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
        }

        function colorForStep(step, base, anchor) {
            const white = [255, 255, 255], black = [0, 0, 0];
            const blend = (a, b, t) => Math.round(a + (b - a) * t);
            const mix = (a, b, t) => [blend(a[0], b[0], t), blend(a[1], b[1], t), blend(a[2], b[2], t)];
            return step <= anchor ? mix(white, base, step / anchor) : mix(base, black, (step - anchor) / (1000 - anchor));
        }

        function linearize(c) {
            c /= 255;
            return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
        }

        function rgbToOklch([r, g, b]) {
            const lr = linearize(r), lg = linearize(g), lb = linearize(b);
            const l = Math.cbrt(0.4122214708 * lr + 0.5363325363 * lg + 0.0514459929 * lb);
            const m = Math.cbrt(0.2119034982 * lr + 0.6806995451 * lg + 0.1073969566 * lb);
            const s = Math.cbrt(0.0883024619 * lr + 0.2817188376 * lg + 0.6299787005 * lb);
            const L  =  0.2104542553 * l + 0.793617785  * m - 0.0040720468 * s;
            const a  =  1.9779984951 * l - 2.428592205  * m + 0.4505937099 * s;
            const bv =  0.0259040371 * l + 0.7827717662 * m - 0.808675766  * s;
            const C = Math.sqrt(a * a + bv * bv);
            const H = ((Math.atan2(bv, a) * 180 / Math.PI) + 360) % 360;
            return [L, C, H];
        }

        function mixOklchForStep([L, C, H], step, anchor) {
            if (step === anchor) return [L, C, H];
            if (step < anchor) { const t = step / anchor; return [t * L + (1 - t), t * C, H]; }
            const p = (1000 - step) / (1000 - anchor);
            return [p * L, p * C, H];
        }

        function formatOklch([L, C, H]) {
            return `oklch(${(L * 100).toFixed(2)}% ${C.toFixed(4)} ${H.toFixed(2)})`;
        }

        function fmtPct(n) { return `${Number(n.toFixed(4))}%`; }

        function oklchMixVar(name, step, anchor) {
            if (step < anchor)
                return `color-mix(in oklch, white ${fmtPct(100 - (step / anchor) * 100)}, var(--color-${name}-${anchor}))`;
            return `color-mix(in oklch, var(--color-${name}-${anchor}) ${fmtPct(((1000 - step) / (1000 - anchor)) * 100)}, black)`;
        }

        const ALL_STEPS = Array.from({ length: 19 }, (_, i) => 50 + i * 50);

        // --- State ---

        let color = '#3b82f6';
        let name = '';
        let anchor = 500;
        let dark = (() => {
            const stored = localStorage.getItem('dark');
            return stored !== null ? stored === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        })();

        // --- Dark mode ---

        function applyDark() {
            document.documentElement.classList.toggle('dark', dark);
            document.getElementById('dark-toggle').textContent = dark ? 'Light' : 'Dark';
        }

        document.getElementById('dark-toggle').addEventListener('click', () => {
            dark = !dark;
            localStorage.setItem('dark', dark);
            applyDark();
            render();
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (localStorage.getItem('dark') === null) { dark = e.matches; applyDark(); render(); }
        });

        // --- Populate anchor select ---

        const anchorSelect = document.getElementById('anchor-select');
        ALL_STEPS.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            if (s === 500) opt.selected = true;
            anchorSelect.appendChild(opt);
        });

        // --- Render ---

        function render() {
            const base = hexToRgb(color);
            const baseOklch = rgbToOklch(base);
            const displayName = name.trim() || 'my-color';

            const steps = ALL_STEPS.map(step => {
                const rgb = colorForStep(step, base, anchor);
                const hex = rgbToHex(rgb);
                const hexTextColor = rgbToOklch(rgb)[0] > 0.5 ? '#000' : '#fff';
                const oklch = mixOklchForStep(baseOklch, step, anchor);
                const oklchStr = formatOklch(oklch);
                const oklchTextColor = oklch[0] > 0.5 ? '#000' : '#fff';
                return { step, hex, hexTextColor, oklchStr, oklchTextColor };
            });

            const byStep = Object.fromEntries(steps.map(s => [s.step, s.hex]));
            const preBg   = dark ? byStep[900] : byStep[100];
            const preFg   = dark ? byStep[300] : byStep[800];
            const selBg   = dark ? byStep[700] : byStep[300];
            const selFg   = dark ? byStep[100] : byStep[900];

            // Selection style
            document.getElementById('sel-style').textContent =
                `pre::selection, pre *::selection { background: ${selBg}; color: ${selFg}; }`;

            // Column headers
            document.getElementById('hex-col-label').textContent   = `RGB hex interpolation (anchored on ${anchor})`;
            document.getElementById('oklch-col-label').textContent  = `OKLCH blend (anchored on ${anchor})`;

            // Swatches
            const swatchContainer = document.getElementById('swatches');
            swatchContainer.innerHTML = '';
            steps.forEach(({ step, hex, hexTextColor, oklchStr, oklchTextColor }) => {
                const row = document.createElement('div');
                row.className = 'swatch-row';

                const hexCell = document.createElement('div');
                hexCell.className = 'swatch-hex';
                hexCell.style.background = hex;
                hexCell.style.color = hexTextColor;
                hexCell.innerHTML = `<span class="step-num">${step}</span><span class="mono">${hex}</span>`;

                const oklchCell = document.createElement('div');
                oklchCell.className = 'swatch-oklch';
                oklchCell.style.background = oklchStr;
                oklchCell.style.color = oklchTextColor;
                oklchCell.innerHTML = `<span class="mono">${oklchStr}</span>`;

                row.appendChild(hexCell);
                row.appendChild(oklchCell);
                swatchContainer.appendChild(row);
            });

            // CSS blocks
            const cssHex = steps.map(({ step, hex }) => `--color-${displayName}-${step}: ${hex};`).join('\n');
            const cssOklchComputed = steps.map(({ step, oklchStr }) => `--color-${displayName}-${step}: ${oklchStr};`).join('\n');
            const cssOklchMix = ALL_STEPS.map(step =>
                step === anchor
                    ? `--color-${displayName}-${anchor}: ${color};`
                    : `--color-${displayName}-${step}: ${oklchMixVar(displayName, step, anchor)};`
            ).join('\n');

            document.getElementById('label-hex').textContent          = `RGB hex interpolation (anchored on ${anchor})`;
            document.getElementById('label-oklch-computed').textContent = `Computed OKLCH values (anchored on ${anchor})`;
            document.getElementById('label-oklch-mix').textContent    = `OKLCH color-mix (anchored on ${anchor})`;

            [['css-hex', cssHex], ['css-oklch-computed', cssOklchComputed], ['css-oklch-mix', cssOklchMix]]
                .forEach(([id, text]) => {
                    const el = document.getElementById(id);
                    el.textContent = text;
                    el.style.background = preBg;
                    el.style.color = preFg;
                });
        }

        // --- Wire up inputs ---

        document.getElementById('color-input').addEventListener('input', e => { color = e.target.value; render(); });
        document.getElementById('anchor-select').addEventListener('change', e => { anchor = Number(e.target.value); render(); });
        document.getElementById('name-input').addEventListener('input', e => { name = e.target.value; render(); });

        // --- Init ---

        applyDark();
        render();
    </script>
</body>
</html>
