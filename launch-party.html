<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch Party Countdowns</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
    }

    body {
        font-family: system-ui, sans-serif;
        background: #111;
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem;
    }

    .container {
        display: flex;
        gap: 3rem;
        flex-wrap: wrap;
    }

    .card {
        background: #1c1c1c;
        border-radius: 16px;
        padding: 2rem;
        min-width: 380px;
        text-align: center;
        box-shadow: 0 0 20px rgba(255,255,255,0.08);
    }

    h2 {
        margin-bottom: 1rem;
        font-size: 1.4rem;
        color: #ddd;
    }

    .date {
        margin-bottom: 1.5rem;
        color: #888;
    }

    .countdown {
        font-size: 3rem;
        font-weight: bold;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.03em;
    }

    .label {
        margin-top: 0.75rem;
        color: #888;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.1em;
    }
</style>
</head>
<body>
<div class="container" id="container">
    <div class="card" id="deadline-card">
        <h2>Application Deadline</h2>
        <div class="date">July 21, 2026</div>
        <div class="countdown" id="deadline"></div>
        <div class="label">Days Remaining</div>
    </div>

    <div class="card">
        <h2>Launch Party</h2>
        <div class="date">October 8, 2026</div>
        <div class="countdown" id="launchparty"></div>
        <div class="label">Days Remaining</div>
    </div>
</div>

<script>
    const deadlineDate = new Date('2026-07-21T00:00:00');
    const launchPartyDate = new Date('2026-10-08T00:00:00');

    const deadlineCard = document.getElementById('deadline-card');

    function updateCountdowns() {
        const now = Date.now();

        const deadlineMs = deadlineDate.getTime() - now;
        const launchMs = launchPartyDate.getTime() - now;

        // Remove deadline card permanently after deadline passes
        if (deadlineMs <= 0 && deadlineCard?.parentNode) {
            deadlineCard.parentNode.removeChild(deadlineCard);
        } else if (deadlineMs > 0) {
            document.getElementById('deadline').textContent =
                (deadlineMs / 86400000).toFixed(7);
        }

        document.getElementById('launchparty').textContent =
            (launchMs / 86400000).toFixed(7);
    }

    updateCountdowns();
    setInterval(updateCountdowns, 50);
</script>
</body>
</html>
