<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Tailwind Color Generator</title>
        <style>
            *, *::before, *::after { box-sizing: border-box; }
            body { background: #f3f4f6; color: #111827; padding: 1.5rem; margin: 0; font-family: sans-serif; }
            .container { max-width: 48rem; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
            h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
            .controls { display: flex; gap: 1rem; align-items: center; }
            #colorPicker { width: 4rem; height: 2.5rem; padding: 0; border: 1px solid #d1d5db; cursor: pointer; }
            #nameInput { border: 1px solid #d1d5db; padding: 0.5rem 0.75rem; flex: 1; font-size: 1rem; }
            #swatches { display: grid; grid-template-columns: 1fr 1fr; column-gap: 1rem; }
            .swatch { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem; font-size: 0.875rem; border: 1px solid rgba(0,0,0,0.1); }
            #output { background: #000; color: #4ade80; padding: 1rem; font-size: 0.875rem; overflow-x: auto; user-select: all; margin: 0; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Color Generator</h1>

            <div class="controls">
                <input id="colorPicker" type="color" value="#3b82f6" />
                <input id="nameInput" type="text" placeholder="color name (e.g. primary)" />
            </div>

            <div id="swatches"></div>

            <pre id="output"></pre>
        </div>

        <script>
            const picker = document.getElementById('colorPicker');
            const nameInput = document.getElementById('nameInput');
            const swatches = document.getElementById('swatches');
            const output = document.getElementById('output');

            function hexToRgb(hex) {
                hex = hex.replace('#', '');
                return [
                    parseInt(hex.substring(0, 2), 16),
                    parseInt(hex.substring(2, 4), 16),
                    parseInt(hex.substring(4, 6), 16),
                ];
            }

            function rgbToHex([r, g, b]) {
                return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
            }

            function lerp(a, b, t) {
                return Math.round(a + (b - a) * t);
            }

            function mix(a, b, t) {
                return [lerp(a[0], b[0], t), lerp(a[1], b[1], t), lerp(a[2], b[2], t)];
            }

            function colorForStep(step, base) {
                const white = [255, 255, 255];
                const black = [0, 0, 0];
                if (step <= 500) {
                    return mix(white, base, step / 500);
                } else {
                    return mix(base, black, (step - 500) / 500);
                }
            }

            function generate() {
                const baseHex = picker.value;
                const name = nameInput.value.trim() || 'color';
                const base = hexToRgb(baseHex);

                const leftSteps  = [500, 450, 400, 350, 300, 250, 200, 150, 100, 50];
                const rightSteps = [500, 550, 600, 650, 700, 750, 800, 850, 900, 950];

                // Swatches — left col first, then right col interleaved in CSS grid
                swatches.innerHTML = '';

                function makeSwatch(step, labelColor) {
                    const hex = rgbToHex(colorForStep(step, base));
                    const div = document.createElement('div');
                    div.className = 'swatch';
                    div.style.background = hex;
                    div.style.color = labelColor;
                    div.innerHTML = `<span>${step}</span><span>${hex}</span>`;
                    swatches.appendChild(div);
                }

                // Grid is 2 columns; append left[0], right[0], left[1], right[1], ...
                for (let i = 0; i < leftSteps.length; i++) {
                    makeSwatch(leftSteps[i], '#000');
                    makeSwatch(rightSteps[i], '#fff');
                }

                // CSS output — sorted 50→950
                const allSteps = [];
                for (let i = 50; i <= 950; i += 50) allSteps.push(i);
                let css = '';
                allSteps.forEach(step => {
                    css += `--color-${name}-${step}: ${rgbToHex(colorForStep(step, base))};\n`;
                });

                output.textContent = css;
            }

            picker.addEventListener('input', generate);
            nameInput.addEventListener('input', generate);

            generate();
        </script>
    </body>
</html>
